<article class="content">
  <header class="post-header">
    <h1>{{title}}</h1>
    <div class="post-meta">
      <time>{{date}}</time>
      <span class="sep"></span>
      <span>{{readingTime}} min read</span>
      {{tags}}
    </div>
  </header>
  <div class="post-body">
    {{content}}
  </div>
  {{postnav}}
</article>
